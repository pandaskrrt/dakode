<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=full" />
		
		<script>
			// Cek apakah ada preference tema light yang disimpan secara eksplisit oleh user
			const savedTheme = localStorage.getItem('theme');
			
			// Jika tidak ada data atau datanya adalah 'dark', paksa pasang class dark ke sistem SEBELUM render HTML
			if (savedTheme !== 'light') {
				document.documentElement.classList.add('dark');
			} else {
				document.documentElement.classList.remove('dark');
			}
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</footer>
</html>
